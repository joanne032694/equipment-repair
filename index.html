<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恩主公醫院手術室｜設備儀器送修管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F7F8;
    --surface:#FFFFFF;
    --ink:#1C2B2E;
    --ink-soft:#5B6B6E;
    --line:#DCE6E6;
    --teal:#0E6E6A;
    --teal-dark:#0A4F4C;
    --teal-tint:#E4F2F0;
    --amber:#D98A2B;
    --amber-tint:#FBEDDA;
    --red:#C0503C;
    --red-tint:#F8E7E3;
    --blue:#3A6EA5;
    --blue-tint:#E7EEF6;
    --gray-tint:#EEF1F1;
    --radius:10px;
    --shadow:0 1px 2px rgba(20,40,40,.06),0 4px 14px rgba(20,40,40,.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Noto Sans TC",-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:"Noto Serif TC","Noto Sans TC",serif;}
  .app{max-width:1180px;margin:0 auto;padding:0 20px 60px;}

  /* header */
  header.top{
    padding:28px 0 18px;
    border-bottom:1px solid var(--line);
    margin-bottom:20px;
    display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;
  }
  header.top .title-block{display:flex;align-items:center;gap:12px;}
  .mark{
    width:38px;height:38px;border-radius:9px;
    background:linear-gradient(155deg,var(--teal),var(--teal-dark));
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .mark svg{width:20px;height:20px;stroke:#fff;}
  header.top h1{font-size:21px;margin:0;font-weight:700;letter-spacing:.3px;}
  header.top .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .sync-pill{
    font-size:11.5px;color:var(--teal-dark);background:var(--teal-tint);
    padding:5px 11px;border-radius:100px;display:inline-flex;align-items:center;gap:6px;font-weight:500;
  }
  .sync-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}

  /* tabs */
  nav.tabs{display:flex;gap:4px;margin-bottom:22px;border-bottom:1px solid var(--line);}
  nav.tabs button{
    appearance:none;border:none;background:none;cursor:pointer;
    padding:10px 4px;margin-right:22px;font-size:14.5px;font-weight:600;
    color:var(--ink-soft);border-bottom:2px solid transparent;
    font-family:inherit;transition:.15s;
  }
  nav.tabs button.active{color:var(--teal-dark);border-bottom-color:var(--teal);}
  nav.tabs button:hover{color:var(--teal-dark);}

  .view{display:none;}
  .view.active{display:block;}

  /* toolbar */
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .search-box{
    display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--line);border-radius:8px;padding:8px 12px;min-width:240px;flex:1;max-width:360px;
  }
  .search-box input{border:none;outline:none;font-size:13.5px;flex:1;font-family:inherit;background:transparent;}
  .search-box svg{width:15px;height:15px;stroke:var(--ink-soft);flex-shrink:0;}
  .btn{
    appearance:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;
    font-size:13.5px;padding:9px 16px;border-radius:8px;transition:.15s;display:inline-flex;align-items:center;gap:6px;
  }
  .btn-primary{background:var(--teal);color:#fff;}
  .btn-primary:hover{background:var(--teal-dark);}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--teal);color:var(--teal-dark);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .btn-danger-text{background:none;color:var(--red);border:none;font-weight:600;font-size:12.5px;cursor:pointer;padding:6px 8px;}

  /* equipment grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px;}
  .eq-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;position:relative;
  }
  .eq-card:hover{border-color:var(--teal);transform:translateY(-1px);}
  .eq-card h3{font-size:15px;margin:0 0 3px;font-weight:700;}
  .eq-card .asset{font-size:11.5px;color:var(--ink-soft);font-family:monospace;letter-spacing:.3px;}
  .eq-meta{margin-top:10px;font-size:12.5px;color:var(--ink-soft);line-height:1.9;}
  .eq-meta span{color:var(--ink);}
  .eq-badges{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;}
  .badge-active{background:var(--amber-tint);color:var(--amber);cursor:pointer;}
  .badge-active:hover{background:var(--amber);color:#fff;}
  .badge-none{background:var(--gray-tint);color:var(--ink-soft);}
  .eq-actions{position:absolute;top:12px;right:12px;display:flex;gap:2px;opacity:0;transition:.15s;}
  .eq-card:hover .eq-actions{opacity:1;}
  .icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:5px;color:var(--ink-soft);}
  .icon-btn:hover{background:var(--gray-tint);color:var(--teal-dark);}
  .icon-btn svg{width:15px;height:15px;}

  .empty{
    text-align:center;padding:60px 20px;color:var(--ink-soft);
    background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius);
  }
  .empty svg{width:34px;height:34px;stroke:var(--line);margin-bottom:10px;}

  /* day list (送修追蹤：以日期為主，狀態一眼可見) */
  .day-list{display:flex;flex-direction:column;gap:22px;}
  .day-section .day-header{
    display:flex;align-items:baseline;gap:10px;margin-bottom:10px;
    position:sticky;top:0;background:var(--bg);padding:6px 0;z-index:2;
  }
  .day-section .day-header .day-date{font-size:15px;font-weight:700;font-family:"Noto Serif TC",serif;color:var(--ink);}
  .day-section .day-header .day-count{font-size:11.5px;color:var(--ink-soft);}
  .day-cards{display:flex;flex-direction:column;gap:8px;}
  .rc-card{
    background:var(--surface);border-radius:9px;padding:12px 14px;cursor:pointer;
    box-shadow:var(--shadow);border-left:4px solid var(--teal);transition:.15s;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .rc-card[data-status="維修中"]{border-left-color:var(--amber);}
  .rc-card[data-status="已完成"]{border-left-color:var(--teal);}
  .rc-card[data-status="無法修復"]{border-left-color:var(--red);}
  .rc-card:hover{transform:translateY(-1px);}
  .rc-main{flex:1;min-width:180px;}
  .rc-card .eqname{font-size:13.5px;font-weight:700;margin-bottom:3px;}
  .rc-card .desc{font-size:12px;color:var(--ink-soft);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
  .rc-side{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .rc-applicant{font-size:11.5px;color:var(--ink-soft);min-width:48px;text-align:right;}
  .photo-chip{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;color:var(--ink-soft);}
  .photo-chip svg{width:12px;height:12px;}
  .status-badge{
    font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:100px;white-space:nowrap;
  }
  .status-badge.s-維修中{background:var(--amber-tint);color:var(--amber);}
  .status-badge.s-已完成{background:var(--teal-tint);color:var(--teal-dark);}
  .status-badge.s-無法修復{background:var(--red-tint);color:var(--red);}
  .status-select{
    font-family:inherit;font-size:11.5px;font-weight:600;border-radius:100px;border:1px solid var(--line);
    padding:5px 8px;background:var(--surface);color:var(--ink);cursor:pointer;
  }

  /* report */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
  .stat-card .num{font-size:26px;font-weight:700;font-family:"Noto Serif TC",serif;color:var(--teal-dark);}
  .stat-card .label{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
  .panel h3{font-size:14.5px;margin:0 0 14px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12.5px;}
  .bar-row .label{width:64px;flex-shrink:0;color:var(--ink-soft);}
  .bar-track{flex:1;background:var(--gray-tint);border-radius:100px;height:10px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:100px;background:var(--teal);}
  .bar-row .val{width:34px;text-align:right;font-weight:700;color:var(--ink);}

  table.hist{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.hist th{text-align:left;padding:9px 10px;color:var(--ink-soft);font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.hist td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  table.hist tr:hover td{background:var(--gray-tint);}
  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .chip-filter{
    border:1px solid var(--line);background:var(--surface);border-radius:100px;padding:6px 13px;
    font-size:12px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  }
  .chip-filter.active{background:var(--teal);border-color:var(--teal);color:#fff;}

  /* modal */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(20,35,35,.45);z-index:100;
    align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;
  }
  .overlay.active{display:flex;}
  .modal{
    background:var(--surface);border-radius:14px;max-width:560px;width:100%;padding:26px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
  }
  .modal h2{font-size:17px;margin:0 0 18px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .field input,.field select,.field textarea{
    width:100%;border:1px solid var(--line);border-radius:7px;padding:9px 11px;
    font-size:13.5px;font-family:inherit;background:var(--bg);outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);background:#fff;}
  .field textarea{resize:vertical;min-height:56px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}

  /* photos */
  .photo-section{margin-top:6px;}
  .photo-drop{
    border:1.5px dashed var(--line);border-radius:9px;padding:16px;text-align:center;
    cursor:pointer;font-size:12.5px;color:var(--ink-soft);background:var(--bg);transition:.15s;
  }
  .photo-drop:hover,.photo-drop.dragover{border-color:var(--teal);background:var(--teal-tint);color:var(--teal-dark);}
  .photo-drop svg{width:20px;height:20px;stroke:currentColor;margin-bottom:6px;}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:10px;}
  .photo-thumb{position:relative;border-radius:7px;overflow:hidden;aspect-ratio:1;background:var(--gray-tint);border:1px solid var(--line);}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block;}
  .photo-thumb .rm{
    position:absolute;top:3px;right:3px;background:rgba(20,30,30,.65);color:#fff;border:none;
    width:18px;height:18px;border-radius:50%;font-size:12px;cursor:pointer;line-height:1;
  }
  .photo-uploading{font-size:11.5px;color:var(--teal-dark);margin-top:6px;}

  .lightbox{display:none;position:fixed;inset:0;background:rgba(10,15,15,.9);z-index:200;align-items:center;justify-content:center;padding:30px;}
  .lightbox.active{display:flex;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:6px;}
  .lightbox .close{position:absolute;top:20px;right:26px;color:#fff;font-size:26px;cursor:pointer;background:none;border:none;}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;
    opacity:0;transition:.25s;z-index:300;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:820px){
    .rc-side{width:100%;justify-content:space-between;}
    .field-row{grid-template-columns:1fr;}
  }
  @media(max-width:520px){
    .app{padding:0 12px 40px;}
    header.top{padding:18px 0 14px;gap:10px;}
    header.top h1{font-size:17px;}
    .sync-pill{font-size:10.5px;padding:4px 9px;}
    nav.tabs button{margin-right:14px;font-size:13px;padding:8px 2px;}
    .toolbar{gap:8px;}
    .search-box{min-width:0;max-width:none;width:100%;}
    .btn{padding:9px 12px;font-size:13px;}
    .grid{grid-template-columns:1fr;}
    .stat-row{grid-template-columns:repeat(2,1fr);}
    .overlay{padding:0;align-items:stretch;}
    .modal{max-width:none;width:100%;min-height:100%;border-radius:0;padding:18px 16px 24px;}
    table.hist{font-size:11.5px;}
    table.hist th,table.hist td{padding:7px 6px;}
    .rc-card{padding:10px 12px;gap:8px;}
    .day-header{position:static;}
  }
</style>
<!-- Firebase（用來讓多人共用資料，即時同步）-->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="title-block">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
      <div>
        <h1>恩主公醫院手術室</h1>
        <div class="sub">設備儀器送修管理系統・單位共用・即時同步</div>
      </div>
    </div>
    <div class="sync-pill"><span class="dot"></span>資料為單位共用，所有成員可見與編輯</div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="board">送修追蹤</button>
    <button class="tab-btn" data-tab="equipment">儀器總覽</button>
    <button class="tab-btn" data-tab="report">歷史報表</button>
  </nav>

  <!-- 儀器總覽 -->
  <section id="view-equipment" class="view">
    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="eqSearch" placeholder="搜尋設備名稱／財產編號／單位">
      </div>
      <button class="btn btn-primary" id="btnAddEquipment">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        新增設備
      </button>
    </div>
    <div id="eqSummary" style="font-size:13px;color:var(--ink-soft);margin-bottom:10px;"></div>
    <div class="filter-row" id="eqFilterRow" style="margin-bottom:14px;">
      <button class="chip-filter" data-eqfilter="active">送修中的設備</button>
      <button class="chip-filter" data-eqfilter="all">全部設備</button>
    </div>
    <div id="eqGrid" class="grid"></div>
  </section>

  <!-- 送修追蹤 -->
  <section id="view-board" class="view active">
    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="rcSearch" placeholder="搜尋請修案件">
      </div>
      <button class="btn btn-primary" id="btnAddRepair">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        新增送修申請
      </button>
    </div>
    <div class="filter-row" id="rcYearFilterRow" style="margin-bottom:8px;"></div>
    <div class="filter-row" id="rcStatusFilterRow" style="margin-bottom:14px;"></div>
    <div id="board" class="day-list"></div>
  </section>

  <!-- 歷史報表 -->
  <section id="view-report" class="view">
    <div class="stat-row" id="statRow"></div>
    <div class="panel">
      <h3>狀態分布</h3>
      <div id="statusBars"></div>
    </div>
    <div class="panel">
      <h3>送修次數排行（前5項設備）</h3>
      <div id="topEquip"></div>
    </div>
    <div class="panel">
      <h3>完整送修歷史</h3>
      <div class="filter-row" id="histFilters"></div>
      <div style="overflow-x:auto;">
        <table class="hist" id="histTable"></table>
      </div>
    </div>
  </section>
</div>

<!-- 設備 modal -->
<div class="overlay" id="eqOverlay">
  <div class="modal">
    <h2 id="eqModalTitle">新增設備</h2>
    <input type="hidden" id="eqId">
    <div class="field-row">
      <div class="field"><label>設備名稱 *</label><input id="eqName" placeholder="例：手術電刀"></div>
      <div class="field"><label>財產編號</label><input id="eqAsset" placeholder="例：H150040001"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>型號</label><input id="eqModel" placeholder="選填"></div>
      <div class="field"><label>院區</label><input id="eqSite" placeholder="例：恩主公"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>單位／成本中心</label><input id="eqUnit" placeholder="例：手術室護理站"></div>
      <div class="field"><label>放置位置</label><input id="eqLocation" placeholder="選填"></div>
    </div>
    <div class="field"><label>備註</label><textarea id="eqNote" placeholder="選填"></textarea></div>
    <div class="modal-actions">
      <button class="btn-danger-text" id="btnDeleteEquipment" style="display:none;margin-right:auto;">刪除設備</button>
      <button class="btn btn-ghost" data-close="eqOverlay">取消</button>
      <button class="btn btn-primary" id="btnSaveEquipment">儲存</button>
    </div>
  </div>
</div>

<!-- 送修 modal -->
<div class="overlay" id="rcOverlay">
  <div class="modal" style="max-width:640px;">
    <h2 id="rcModalTitle">新增送修申請</h2>
    <input type="hidden" id="rcId">
    <div class="field-row">
      <div class="field"><label>設備</label>
        <select id="rcEquipmentSelect"><option value="">— 從設備清單選取（選填）—</option></select>
      </div>
      <div class="field"><label>狀態</label>
        <select id="rcStatus">
          <option>維修中</option><option>已完成</option><option>無法修復</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>設備名稱 *</label><input id="rcEquipmentName" placeholder="例：手術電刀"></div>
      <div class="field"><label>財產編號</label><input id="rcAsset" placeholder="選填"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>申請人姓名</label><input id="rcApplicant" placeholder="選填"></div>
      <div class="field"><label>申請人電話</label><input id="rcPhone" placeholder="選填"></div>
    </div>
    <div class="field"><label>故障說明</label><textarea id="rcFault" placeholder="描述故障情形"></textarea></div>
    <div class="field-row">
      <div class="field"><label>內修／外修</label>
        <select id="rcType"><option>內修</option><option>外修</option></select>
      </div>
      <div class="field"><label>分派／承辦人員</label><input id="rcAssignee" placeholder="選填"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>請修日期</label><input type="date" id="rcApplyDate"></div>

let equipment = [];
let repairs = [];
let photoCache = {}; // repairId -> [base64,...]
let currentPhotos = []; // photos being edited in modal
const STATUSES = ["維修中","已完成","無法修復"];

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function loadAll(){
  if(!firebaseReady){
    toast('⚠️ 尚未設定 Firebase，資料暫時不會同步，請聯絡系統管理員設定 firebaseConfig');
  }
  try{
    const snap = await db.ref('equipment-list').once('value');
    equipment = snap.val() || [];
  }catch(e){ equipment = []; }
  try{
    const snap = await db.ref('repair-list').once('value');
    repairs = snap.val() || [];
  }catch(e){ repairs = []; }

  if(equipment.length===0 && repairs.length===0 && SEED_DATA){
    equipment = SEED_DATA.equipment;
    repairs = SEED_DATA.repairs;
    await saveEquipmentList();
    await saveRepairList();
    toast('已匯入恩主公醫院手術室歷史送修資料');
  }

  const yrs = getAvailableYears();
  if(yrs.length){ rcYearFilter = yrs[0]; }

  populateEquipmentSelect();
  renderEquipment();
  renderBoard();
  renderReport();

  // 即時監聽：其他人在別的裝置新增/修改資料時，這裡會自動更新畫面
  if(firebaseReady){
    db.ref('equipment-list').on('value', snap=>{
      const val = snap.val() || [];
      if(JSON.stringify(val)!==JSON.stringify(equipment)){
        equipment = val;
        populateEquipmentSelect();
        renderEquipment();
      }
    });
    db.ref('repair-list').on('value', snap=>{
      const val = snap.val() || [];
      if(JSON.stringify(val)!==JSON.stringify(repairs)){
        repairs = val;
        renderBoard();
        renderEquipment();
      }
    });
  }
}

async function saveEquipmentList(){
  if(!firebaseReady){ toast('⚠️ 尚未設定 Firebase，無法儲存'); return; }
  try{
    await db.ref('equipment-list').set(equipment);
  }catch(e){ toast('儲存失敗：'+e.message); }
}
async function saveRepairList(){
  if(!firebaseReady){ toast('⚠️ 尚未設定 Firebase，無法儲存'); return; }
  try{
    await db.ref('repair-list').set(repairs);
  }catch(e){ toast('儲存失敗：'+e.message); }
}
async function loadPhotos(id){
  if(photoCache[id]) return photoCache[id];
  if(!firebaseReady){ return []; }
  try{
    const snap = await db.ref('photos/'+id).once('value');
    const arr = snap.val() || [];
    photoCache[id] = arr;
    return arr;
  }catch(e){ photoCache[id] = []; return []; }
}
async function savePhotos(id, arr){
  photoCache[id] = arr;
  if(!firebaseReady){ toast('⚠️ 尚未設定 Firebase，照片無法儲存'); return; }
  try{
    await db.ref('photos/'+id).set(arr);
  }catch(e){ toast('照片儲存失敗：'+e.message); }
}

function uid(prefix){ return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- Tabs ---------- */
function switchTab(tabName){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tabName));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tabName).classList.add('active');
  if(tabName==='report') renderReport();
}
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>switchTab(btn.dataset.tab));
});

/* ---------- Equipment ---------- */
let eqFilterMode = 'active'; // 'active' = 只顯示送修中的設備（預設）, 'all' = 全部設備
function activeRepairCount(eqName, asset){
  return repairs.filter(r=>r.equipmentName===eqName && (r.asset||'')===(asset||'') && r.status!=='已完成' && r.status!=='無法修復').length;
}
function renderEquipment(){
  const q = (document.getElementById('eqSearch').value||'').trim().toLowerCase();
  const grid = document.getElementById('eqGrid');

  const activeRepairTotal = repairs.filter(r=>r.status!=='已完成' && r.status!=='無法修復').length;
  const eqWithActive = equipment.filter(e=>activeRepairCount(e.name, e.asset)>0).length;
  document.getElementById('eqSummary').textContent =
    `共 ${equipment.length} 項設備，目前有 ${eqWithActive} 項設備、共 ${activeRepairTotal} 筆送修中案件`;

  document.querySelectorAll('#eqFilterRow [data-eqfilter]').forEach(b=>{
    b.classList.toggle('active', b.dataset.eqfilter===eqFilterMode);
  });

  let list = equipment.filter(e=>{
    if(!q) return true;
    return [e.name,e.asset,e.unit,e.model,e.site].join(' ').toLowerCase().includes(q);
  });
  list = list.map(e=>({e, cnt: activeRepairCount(e.name, e.asset)}));
  if(eqFilterMode==='active'){
    list = list.filter(x=>x.cnt>0);
  }
  list.sort((a,b)=>b.cnt-a.cnt);

  if(list.length===0){
    const msg = eqFilterMode==='active'
      ? '目前沒有送修中的設備，太棒了！可切換「全部設備」查看所有儀器'
      : (q?'找不到符合的設備':'尚未建立任何設備資料，點右上角新增設備');
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      <div>${msg}</div>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(({e, cnt})=>{
    const activeCnt = cnt;
    return `<div class="eq-card" data-id="${e.id}">
      <div class="eq-actions">
        <button class="icon-btn" data-edit="${e.id}" title="編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
      </div>
      <h3>${escapeHtml(e.name)}</h3>
      <div class="asset">${escapeHtml(e.asset||'無財產編號')}</div>
      <div class="eq-meta">
        ${e.model?`型號：<span>${escapeHtml(e.model)}</span><br>`:''}
        ${e.site?`院區：<span>${escapeHtml(e.site)}</span><br>`:''}
        ${e.unit?`單位：<span>${escapeHtml(e.unit)}</span><br>`:''}
        ${e.location?`位置：<span>${escapeHtml(e.location)}</span>`:''}
      </div>
      <div class="eq-badges">
        ${activeCnt>0?`<span class="badge badge-active" data-jump="${escapeHtml(e.name)}" title="點擊查看這些送修案件">${activeCnt} 筆送修中 →</span>`:`<span class="badge badge-none">無送修中案件</span>`}
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('[data-edit]').forEach(b=>{

let rcYearFilter = 'all';
let rcStatusFilter = 'all';
function getAvailableYears(){
  const years = new Set();
  repairs.forEach(r=>{ if(r.applyDate) years.add(r.applyDate.slice(0,4)); });
  return Array.from(years).sort((a,b)=>b.localeCompare(a));
}
function renderYearFilterRow(){
  const years = getAvailableYears();
  const row = document.getElementById('rcYearFilterRow');
  row.innerHTML = ['all',...years].map(y=>{
    const label = y==='all' ? '全部年份' : y+' 年';
    return `<button class="chip-filter ${rcYearFilter===y?'active':''}" data-rcyear="${y}">${label}</button>`;
  }).join('');
  row.querySelectorAll('[data-rcyear]').forEach(b=>{
    b.addEventListener('click', ()=>{ rcYearFilter = b.dataset.rcyear; renderBoard(); });
  });
}
function renderStatusFilterRow(){
  const row = document.getElementById('rcStatusFilterRow');
  row.innerHTML = ['all',...STATUSES].map(s=>{
    const label = s==='all' ? '全部狀態' : s;
    return `<button class="chip-filter ${rcStatusFilter===s?'active':''}" data-rcstatus="${s}">${label}</button>`;
  }).join('');
  row.querySelectorAll('[data-rcstatus]').forEach(b=>{
    b.addEventListener('click', ()=>{ rcStatusFilter = b.dataset.rcstatus; renderBoard(); });
  });
}

function formatDateLabel(d){
  const parts = d.split('-');
  if(parts.length!==3) return d;
  return `${parts[0]}/${parts[1]}/${parts[2]}`;
}

// 以「送修日期」為主軸：同一天送修的案件全部排在一起，
// 每張卡片直接用狀態徽章／下拉選單顯示目前是送修中還是已完成，不用切分頁或翻欄位找。
function renderBoard(){
  renderYearFilterRow();
  renderStatusFilterRow();
  const q = (document.getElementById('rcSearch').value||'').trim().toLowerCase();
  const board = document.getElementById('board');

  const items = repairs.filter(r=>{
    if(rcYearFilter!=='all' && (r.applyDate||'').slice(0,4)!==rcYearFilter) return false;
    if(rcStatusFilter!=='all' && r.status!==rcStatusFilter) return false;
    if(!q) return true;
    return [r.equipmentName,r.asset,r.applicant,r.fault,r.vendor].join(' ').toLowerCase().includes(q);
  }).sort((a,b)=>(b.applyDate||'').localeCompare(a.applyDate||''));

  if(items.length===0){
    board.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      <div>沒有符合條件的送修案件</div>
    </div>`;
    return;
  }

  const days = [];
  let lastDate = null;
  items.forEach(r=>{
    const d = r.applyDate || '日期未填';
    if(d !== lastDate){ days.push({date:d, items:[]}); lastDate = d; }
    days[days.length-1].items.push(r);
  });

  board.innerHTML = days.map(day=>`
    <div class="day-section">
      <div class="day-header">
        <span class="day-date">${day.date==='日期未填'?day.date:formatDateLabel(day.date)}</span>
        <span class="day-count">當天 ${day.items.length} 筆送修</span>
      </div>
      <div class="day-cards">
        ${day.items.map(r=>renderCard(r)).join('')}
      </div>
    </div>`).join('');

  board.querySelectorAll('.rc-card').forEach(c=>{
    c.addEventListener('click',(ev)=>{
      if(ev.target.closest('.status-select')) return;
      openRepairModal(c.dataset.id);
    });
  });
  board.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('click', ev=>ev.stopPropagation());
    sel.addEventListener('change', async (ev)=>{
      ev.stopPropagation();
      const r = repairs.find(x=>x.id===sel.dataset.id);
      r.status = sel.value;
      await saveRepairList();
      renderBoard(); renderEquipment();
      toast('狀態已更新為「'+r.status+'」');
    });
  });
}
document.getElementById('rcSearch').addEventListener('input', renderBoard);

function renderCard(r){
  return `<div class="rc-card" data-id="${r.id}" data-status="${r.status}">
    <div class="rc-main">
      <div class="eqname">${escapeHtml(r.equipmentName||'未命名設備')}</div>
      <div class="desc">${escapeHtml(r.fault||'（無故障說明）')}</div>
    </div>
    <div class="rc-side">
      <span class="photo-chip">
        ${(r.photoCount||0)>0?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg> ${r.photoCount}`:''}
      </span>
      <span class="rc-applicant">${escapeHtml(r.applicant||'')}</span>
      <select class="status-select" data-id="${r.id}">
        ${STATUSES.map(s=>`<option value="${s}" ${s===r.status?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>

}

/* ---------- Photos ---------- */
function compressImage(file, maxDim=1000, quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>h && w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderPhotoGrid(){
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = currentPhotos.map((p,i)=>`
    <div class="photo-thumb">
      <img src="${p}" data-idx="${i}">
      <button class="rm" data-rm="${i}">&times;</button>
    </div>`).join('');
  grid.querySelectorAll('img').forEach(img=>{
    img.addEventListener('click', ()=>{
      document.getElementById('lightboxImg').src = img.src;
      document.getElementById('lightbox').classList.add('active');
    });
  });
  grid.querySelectorAll('[data-rm]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentPhotos.splice(Number(btn.dataset.rm),1);
      renderPhotoGrid();
    });
  });
}

async function handleFiles(files){
  const imgFiles = Array.from(files).filter(f=>f.type.startsWith('image/'));
  if(imgFiles.length===0) return;
  if(currentPhotos.length + imgFiles.length > 12){
    toast('每筆案件最多附加 12 張照片');
  }
  document.getElementById('photoUploading').style.display='block';
  for(const f of imgFiles.slice(0, Math.max(0,12-currentPhotos.length))){
    try{
      const dataUrl = await compressImage(f);
      currentPhotos.push(dataUrl);
    }catch(e){ toast('照片處理失敗：'+f.name); }
  }
  document.getElementById('photoUploading').style.display='none';
  renderPhotoGrid();
}

const photoDrop = document.getElementById('photoDrop');
const photoInput = document.getElementById('photoInput');
photoDrop.addEventListener('click', ()=>photoInput.click());
photoInput.addEventListener('change', (e)=>{ handleFiles(e.target.files); photoInput.value=''; });
photoDrop.addEventListener('dragover',(e)=>{ e.preventDefault(); photoDrop.classList.add('dragover'); });
photoDrop.addEventListener('dragleave',()=>photoDrop.classList.remove('dragover'));
photoDrop.addEventListener('drop',(e)=>{
  e.preventDefault(); photoDrop.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

/* ---------- Report ---------- */
let histFilter = '全部';
function renderReport(){
  const total = repairs.length;
  const active = repairs.filter(r=>r.status!=='已完成' && r.status!=='無法修復').length;
  const done = repairs.filter(r=>r.status==='已完成').length;
  const unresolvable = repairs.filter(r=>r.status==='無法修復').length;

  document.getElementById('statRow').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">累計送修次數</div></div>
    <div class="stat-card"><div class="num">${active}</div><div class="label">目前維修中案件</div></div>
    <div class="stat-card"><div class="num">${done}</div><div class="label">已完成案件</div></div>
    <div class="stat-card"><div class="num">${unresolvable}</div><div class="label">無法修復案件</div></div>
  `;

  const max = Math.max(1, ...STATUSES.map(s=>repairs.filter(r=>r.status===s).length));
  document.getElementById('statusBars').innerHTML = STATUSES.map(s=>{
    const c = repairs.filter(r=>r.status===s).length;
    return `<div class="bar-row"><div class="label">${s}</div><div class="bar-track"><div class="bar-fill" style="width:${c/max*100}%"></div></div><div class="val">${c}</div></div>`;
  }).join('');

  const counts = {};
  repairs.forEach(r=>{ const k=r.equipmentName||'（未命名）'; counts[k]=(counts[k]||0)+1; });
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topMax = Math.max(1, ...top.map(t=>t[1]));
  document.getElementById('topEquip').innerHTML = top.length? top.map(([name,c])=>`
    <div class="bar-row"><div class="label" style="width:120px;">${escapeHtml(name)}</div><div class="bar-track"><div class="bar-fill" style="width:${c/topMax*100}%;background:var(--amber)"></div></div><div class="val">${c}</div></div>
  `).join('') : `<div style="color:var(--ink-soft);font-size:12.5px;">尚無資料</div>`;

  document.getElementById('histFilters').innerHTML = ['全部',...STATUSES].map(s=>
    `<button class="chip-filter ${histFilter===s?'active':''}" data-filter="${s}">${s}</button>`
  ).join('');
  document.querySelectorAll('[data-filter]').forEach(b=>{
    b.addEventListener('click', ()=>{ histFilter=b.dataset.filter; renderReport(); });
  });

  const rows = repairs.filter(r=>histFilter==='全部'||r.status===histFilter)
    .sort((a,b)=>(b.applyDate||'').localeCompare(a.applyDate||''));
  const table = document.getElementById('histTable');
  table.innerHTML = `<thead><tr>
      <th>設備名稱</th><th>財產編號</th><th>申請人</th><th>請修日期</th><th>狀態</th><th>內外修</th><th>廠商</th><th>完工日</th><th>照片</th>
    </tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td>${escapeHtml(r.equipmentName)}</td>
      <td>${escapeHtml(r.asset||'—')}</td>
      <td>${escapeHtml(r.applicant||'—')}</td>
      <td>${escapeHtml(r.applyDate||'—')}</td>
      <td>${escapeHtml(r.status)}</td>
      <td>${escapeHtml(r.repairType||'—')}</td>
      <td>${escapeHtml(r.vendor||'—')}</td>
      <td>${escapeHtml(r.completedDate||'—')}</td>
      <td>${r.photoCount||0}</td>
    </tr>`).join('') || `<tr><td colspan="9" style="text-align:center;color:var(--ink-soft);padding:24px;">尚無資料</td></tr>`}
    </tbody>`;
}
